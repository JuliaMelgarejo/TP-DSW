<div class="card shadow-sm">
  <div class="card-body p-4">

    <div class="mb-4">
      <h3 class="fw-bold h4 mb-1 text-black">Registro Rescate-Animales</h3>
      <p class="text-muted small mb-0">Completá los datos del rescate</p>
    </div>

    <form [formGroup]="rescueForm">

      <div class="mb-3">
        <label class="form-label fw-bold small text-secondary">Fecha de rescate</label>
        <input 
          class="form-control" 
          type="date" 
          formControlName="rescue_date" 
          [class.is-invalid]="rescueForm.get('rescue_date')?.touched && rescueForm.get('rescue_date')?.invalid"
        />
        <div class="invalid-feedback">
          La fecha de rescate es requerida.
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label fw-bold small text-secondary">Dirección</label>
        <div class="p-3 border rounded bg-white">
          <app-address-picker [form]="addressForm"></app-address-picker>
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label fw-bold small text-secondary">Descripción</label>
        <textarea
          class="form-control"
          rows="3"
          formControlName="description"
          placeholder="Descripción del rescate (opcional)">
        </textarea>
      </div>    

      <div class="mb-0">
        <label class="form-label fw-bold small text-secondary">Comentarios</label>
        <textarea
          class="form-control"
          rows="3"
          formControlName="comments"
          placeholder="Comentarios internos (opcional)">
        </textarea>
      </div>

    </form>
  </div>
</div>
