<div class="pa-page">
  <div class="pa-container">
    <div class="pa-card pa-section pa-panel">
      <div class="mb-3">
        <div class="pa-h3 mb-0">Mi perfil</div>
        <div class="pa-muted pa-small">Completá tus datos personales</div>
      </div>
      <form [formGroup]="PersonForm" (submit)="updatePerson()" class="form-container">
        <div class="row g-3">
          <div class="col-12 col-lg-6 left-column">
            <div calss="center-content">
              <div class="form-fieldset mb-3 d-flex flex-column rounded">
                <label for="name">Nombre:</label>
                <input type="text" id="person-name" formControlName="name">
                <p class="error" *ngIf="PersonForm.get('name')?.invalid && PersonForm.get('name')?.touched">El nombre es obligatorio</p>
              </div>

              <div class="form-fieldset mb-3 d-flex flex-column rounded">
                <label for="surname">Apellido:</label>
                <input type="text" id="person-surname" formControlName="surname">
                <p class="error" *ngIf="PersonForm.get('surname')?.invalid && PersonForm.get('surname')?.touched">El apellido es obligatorio</p>
              </div>

              <div class="form-fieldset mb-3 d-flex flex-column rounded">
                <label for="doc_type">Tipo de documento:</label>
                <select id="person-doc_type" formControlName="doc_type">
                  <option [ngValue]="null" disabled selected>Seleccione un tipo de documento</option>
                  <option *ngFor="let doc of documentTypes" [ngValue]="doc.value">{{ doc.label }}</option>
                </select>
                <p class="error" *ngIf="PersonForm.get('doc_type')?.invalid && PersonForm.get('doc_type')?.touched">El tipo de documento es obligatorio</p>
              </div>

              <div class="form-fieldset mb-3 d-flex flex-column rounded">
                <label for="doc_nro">Número de documento:</label>
                <input type="text" id="person-doc_nro" formControlName="doc_nro">
                <p class="error" *ngIf="PersonForm.get('doc_nro')?.invalid && PersonForm.get('doc_nro')?.touched">El número de documento es obligatorio</p>
              </div>

              <div class="form-fieldset mb-3 d-flex flex-column rounded">
                <label for="email">Email:</label>
                <input type="email" id="person-email" formControlName="email">
              </div>

              <div class="form-fieldset mb-3 d-flex flex-column rounded">
                <label for="phoneNumber">Teléfono:</label>
                <input type="text" id="person-phoneNumber" formControlName="phoneNumber">
              </div>
            </div>
          </div>
          <div class="col-12 col-lg-6 mt-3 mt-lg-0 right-column pt-lg-1">
            <div class="form-fieldset mb-3 d-flex flex-column rounded">
              <label for="birthdate">Fecha de nacimiento:</label>
              <input type="date" id="person-birthdate" formControlName="birthdate">
              <p class="error" *ngIf="PersonForm.get('birthdate')?.invalid && PersonForm.get('birthdate')?.touched">La fecha de nacimiento es obligatoria</p>
            </div>
            
            <!-- PAIS -->
            <div class="mb-4">
              <label for="country">País</label>
              <select formControlName="country" (change)="onCountryChange()" class="w-100">
                <option [ngValue]="null" disabled selected>Seleccione un país</option>
                <option *ngFor="let country of countries" [value]="country.id">
                  {{ country.name }}
                </option>
              </select>
            </div>

            <!-- PROVINCIA -->
            <div class="mb-4">
              <label for="country">Provincia</label>
              <select formControlName="province" (change)="onProvinceChange()" class="w-100">
                <option [ngValue]="null" disabled selected>Seleccione una provincia</option>
                <option *ngFor="let province of provinces" [value]="province.id">
                  {{ province.name }}
                </option>
              </select>
            </div>

            <!-- CIUDAD -->
            <div class="mb-4">
              <label for="country">Ciudad</label>
              <select formControlName="city" class="w-100">
                <option [ngValue]="null" disabled selected>Seleccione una ciudad</option>
                <option *ngFor="let city of cities" [value]="city.id">
                  {{ city.name }}
                </option>
              </select>
              <p class="error" *ngIf="PersonForm.get('city')?.invalid && PersonForm.get('city')?.touched">La ciudad es obligatoria</p>
            </div>

            <div class="form-fieldset mb-3 d-flex flex-column rounded">
              <label for="street">Calle:</label>
              <input type="text" id="person-street" formControlName="street">
              <p class="error" *ngIf="PersonForm.get('street')?.invalid && PersonForm.get('street')?.touched">La calle es obligatoria</p>
            </div>

            <div class="form-fieldset mb-3 d-flex flex-column rounded">
              <label for="street_number">Número de calle:</label>
              <input type="text" id="person-number_street" formControlName="number_street">
              <p class="error" *ngIf="PersonForm.get('number_street')?.invalid && PersonForm.get('number_street')?.touched">El número de calle es obligatorio</p>
            </div>
            <div class="form-fieldset mb-3 d-flex flex-column rounded">
              <label for="nroCuit">CUIT:</label>
              <input type="number" id="person-nroCuit" formControlName="nroCuit">
            </div>
          </div>
          <div class="form-submit">
            <button type="submit" [disabled]="PersonForm.invalid" class="btn btn-primary w-100">Actualizar Persona</button>
          </div>
        </div>
      </form>
    </div>
  </div>
</div>
