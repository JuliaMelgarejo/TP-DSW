<div class="bg-light min-vh-100 py-4">
  <div class="container px-3 px-lg-4">
    <div class="card border-0 shadow-sm">
      <div class="card-body p-3 p-lg-4">

        <div class="mb-3 d-flex flex-column flex-md-row justify-content-between align-items-start align-items-md-center gap-2">
          <div>
            <h3 class="mb-1">Mi perfil</h3>
            <div class="text-muted small">Completá tus datos personales</div>
          </div>

          <div *ngIf="this.auth.isShelter()">
            <button routerLink="/my-shelter" class="btn btn-secondary">
              Modificar mi refugio
            </button>
          </div>
        </div>

        <form [formGroup]="PersonForm" (submit)="updatePerson()">
          <div class="row g-3">

            <div class="col-12 col-lg-6">
              <div class="d-flex flex-column">

                <div class="mb-3">
                  <label for="person-name" class="form-label">Nombre:</label>
                  <input type="text" id="person-name" formControlName="name" class="form-control">
                  <p class="text-danger small mt-1 mb-0" *ngIf="PersonForm.get('name')?.invalid && PersonForm.get('name')?.touched">
                    El nombre es obligatorio
                  </p>
                </div>

                <div class="mb-3">
                  <label for="person-surname" class="form-label">Apellido:</label>
                  <input type="text" id="person-surname" formControlName="surname" class="form-control">
                  <p class="text-danger small mt-1 mb-0" *ngIf="PersonForm.get('surname')?.invalid && PersonForm.get('surname')?.touched">
                    El apellido es obligatorio
                  </p>
                </div>

                <div class="mb-3">
                  <label for="person-doc_type" class="form-label">Tipo de documento:</label>
                  <select id="person-doc_type" formControlName="doc_type" class="form-select">
                    <option [ngValue]="null" disabled selected>Seleccione un tipo de documento</option>
                    <option *ngFor="let doc of documentTypes" [ngValue]="doc.value">{{ doc.label }}</option>
                  </select>
                  <p class="text-danger small mt-1 mb-0" *ngIf="PersonForm.get('doc_type')?.invalid && PersonForm.get('doc_type')?.touched">
                    El tipo de documento es obligatorio
                  </p>
                </div>

                <div class="mb-3">
                  <label for="person-doc_nro" class="form-label">Número de documento:</label>
                  <input type="text" id="person-doc_nro" formControlName="doc_nro" class="form-control">
                  <p class="text-danger small mt-1 mb-0" *ngIf="PersonForm.get('doc_nro')?.invalid && PersonForm.get('doc_nro')?.touched">
                    El número de documento es obligatorio
                  </p>
                </div>

                <div class="mb-3">
                  <label for="person-email" class="form-label">Email:</label>
                  <input type="email" id="person-email" formControlName="email" class="form-control">
                </div>

                <div class="mb-3">
                  <label for="person-phoneNumber" class="form-label">Teléfono:</label>
                  <input type="text" id="person-phoneNumber" formControlName="phoneNumber" class="form-control">
                </div>

              </div>
            </div>

            <div class="col-12 col-lg-6">
              <div class="mb-3">
                <label for="person-birthdate" class="form-label">Fecha de nacimiento:</label>
                <input type="date" id="person-birthdate" formControlName="birthdate" class="form-control">
                <p class="text-danger small mt-1 mb-0" *ngIf="PersonForm.get('birthdate')?.invalid && PersonForm.get('birthdate')?.touched">
                  La fecha de nacimiento es obligatoria
                </p>
              </div>

              <div class="mb-3">
                <label for="person-nroCuit" class="form-label">CUIT:</label>
                <input type="number" id="person-nroCuit" formControlName="nroCuit" class="form-control">
              </div>
            </div>

            <div class="col-12">
              <div class="mb-3">
                <app-address-picker [form]="addressForm"></app-address-picker>
              </div>
            </div>

            <div class="col-12">
              <button type="submit" [disabled]="PersonForm.invalid" class="btn btn-primary w-100">
                Actualizar Persona
              </button>
            </div>

          </div>
        </form>

      </div>
    </div>
  </div>
</div>
