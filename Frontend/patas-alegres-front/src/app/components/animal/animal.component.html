<div class="pa-page">
  <div class="container-fluid px-3">

    <div class="position-relative mb-4">
      <div class="text-center">
        <div class="pa-h2">{{ getTitle() }}</div>
        <div class="pa-muted pa-small">
          {{ getSubtitle() }}
        </div>
      </div>

      <div class="position-absolute top-0 end-0">
        <a class="pa-btn pa-btn-outline" [routerLink]="getBackLink()">
          Volver
        </a>
      </div>
    </div>

    <div *ngIf="loading" class="pa-muted text-center mb-3">
      Cargando...
    </div>

    <div class="row g-3">
      <div class="col-12 col-md-6 col-lg-4" *ngFor="let animal of animalService.animals">

        <a
          class="pa-card pa-card-hover d-block text-decoration-none"
          [routerLink]="['/animal', animal.id]"
          style="color: inherit; overflow: hidden;"
        >

          <img
            [src]="getPhotoUrl(animal)"
            [alt]="animal?.name || 'Animal'"
            class="w-100 d-block"
            style="height: 220px; object-fit: cover;"
          />

          <div class="pa-section">

            <div class="fw-bold mb-2">
              {{ animal?.name || '—' }}
            </div>

            <div class="pa-muted pa-small">Raza</div>
            <div class="fw-semibold mb-2">
              {{ animal?.breed?.name || '—' }}
            </div>

            <div class="pa-muted pa-small">Fecha rescate</div>
            <div class="fw-semibold mb-2">
              {{ animal?.rescueClass?.rescue_date ? (animal.rescueClass.rescue_date | date:'dd/MM/yyyy') : '—' }}
            </div>

            <div class="pa-muted pa-small">Descripción</div>
            <div class="mb-2">
              {{ animal?.description || '—' }}
            </div>

            <div class="mt-2 fw-bold" style="color: var(--pa-primary-dark);">
              Ver información →
            </div>

          </div>
        </a>

      </div>
    </div>

  </div>
</div>
