<div class="container py-4">

  <div class="row g-4">

    <!-- FOTO -->
    <div class="col-lg-5">
      <div class="card shadow-sm p-3">

        <h5 class="mb-3">Foto</h5>

        <!-- FOTO ACTUAL -->
        <img
          *ngIf="getMainPhotoUrl(); else noPhoto"
          [src]="getMainPhotoUrl()!"
          class="img-fluid rounded border mb-3"
          style="height:280px; object-fit:cover;"
        />

        <ng-template #noPhoto>
          <img src="assets/nophoto.png" class="img-fluid rounded border mb-3" style="height:280px; object-fit:cover;">
        </ng-template>

        <!-- PREVIEW -->
        <img *ngIf="previewUrl" [src]="previewUrl" class="img-fluid rounded border mb-3" style="height:280px; object-fit:cover;">

        <!-- INPUT LOCAL -->
        <input type="file" class="form-control mb-2" accept="image/*" (change)="onFileChange($event)">

        <button class="btn btn-primary w-100" (click)="uploadPhoto()" [disabled]="uploading || !selectedFile">
          {{uploading ? 'Subiendo...' : 'Subir foto'}}
        </button>

      </div>
    </div>

    <!-- INFO -->
    <div class="col-lg-7">
      <div class="card shadow-sm p-3">

        <h5 class="mb-3">Información</h5>

        <form [formGroup]="animalForm">

          <label class="form-label">Nombre</label>
          <input class="form-control mb-3" formControlName="name">

          <label class="form-label">Nacimiento</label>
          <input type="date" class="form-control mb-3" formControlName="birth_date">

          <label class="form-label">Raza</label>
          <input class="form-control mb-3" formControlName="breed" readonly>

          <button class="btn btn-success w-100" (click)="updateAnimal()" type="button">
            Guardar cambios
          </button>

        </form>

      </div>
    </div>

  </div>

</div>
