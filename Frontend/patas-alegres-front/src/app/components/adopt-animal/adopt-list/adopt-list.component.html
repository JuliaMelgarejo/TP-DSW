<div class="pa-page">
  <div class="container-fluid px-3">

    <!-- HEADER -->
    <div class="position-relative mb-4">

      <!-- Título centrado -->
      <div class="text-center">
        <div class="pa-h2">Lista de solicitudes recibidas</div>
        <div class="pa-muted pa-small">
          Pedidos de adopción para tu refugio
        </div>
      </div>

      <!-- Botón Volver a la derecha -->
      <div class="position-absolute top-0 end-0">
        <a class="pa-btn pa-btn-outline" routerLink="/home">
          Volver
        </a>
      </div>

    </div>

    <!-- Loading -->
    <div *ngIf="loading" class="pa-card pa-section">
      <div class="pa-muted">Cargando...</div>
    </div>

    <!-- Error -->
    <div *ngIf="!loading && errMsg" class="pa-card pa-section">
      <div class="pa-alert pa-alert-danger">{{ errMsg }}</div>
    </div>

    <!-- Empty -->
    <div *ngIf="!loading && !errMsg && allItems.length === 0" class="pa-card pa-section">
      <div class="pa-muted">Todavía no hay solicitudes para tus animales.</div>
    </div>

    <!-- GRID -->
    <div *ngIf="!loading && !errMsg && items.length > 0" class="row g-3">

      <div class="col-12 col-md-6 col-lg-4" *ngFor="let a of items">

        <button
          type="button"
          class="pa-card pa-card-hover d-block text-start w-100"
          (click)="goDetail(a.id)"
          style="color: inherit; overflow: hidden; padding: 0; border: none;">

          <!-- Imagen -->
          <img
            [src]="getPhoto(a)"
            [alt]="a?.animal?.name || 'Animal'"
            class="w-100 d-block"
            style="height: 220px; object-fit: cover;"
          />

          <!-- Contenido -->
          <div class="pa-section">

            <div class="fw-bold mb-2">
              Nombre: {{ a?.animal?.name || '—' }}
            </div>

            <div class="pa-muted pa-small">Estado</div>
            <div class="fw-semibold mb-2">
              {{ a?.currentState || '—' }}
            </div>

            <div class="pa-muted pa-small">Solicitante</div>
            <div class="fw-semibold mb-2">
              {{ a?.applicant?.name || '—' }}
            </div>

            <div class="pa-muted pa-small">Fecha del pedido</div>
            <div class="fw-semibold mb-2">
              {{ a?.adoption_date ? (a.adoption_date | date:'dd/MM/yyyy') : '—' }}
            </div>

            <div class="mt-2 fw-bold" style="color: var(--pa-primary-dark);">
              Ver detalle →
            </div>

          </div>
        </button>

      </div>
    </div>

    <!-- PAGINACIÓN (si la tenés) -->
    <div *ngIf="!loading && !errMsg && totalPages > 1" class="d-flex justify-content-center mt-4">
      <nav aria-label="Paginación">
        <ul class="pagination pagination-sm mb-0">

          <li class="page-item" [class.disabled]="page === 1">
            <button class="page-link" (click)="goPage(page - 1)" [disabled]="page === 1">‹</button>
          </li>

          <li class="page-item"
              *ngFor="let p of pages"
              [class.active]="p === page">
            <button class="page-link" (click)="goPage(p)">{{ p }}</button>
          </li>

          <li class="page-item" [class.disabled]="page === totalPages">
            <button class="page-link" (click)="goPage(page + 1)" [disabled]="page === totalPages">›</button>
          </li>

        </ul>
      </nav>
    </div>

  </div>
</div>
