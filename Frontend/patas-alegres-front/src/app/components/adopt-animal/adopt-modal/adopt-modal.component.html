<div class="modal fade" [id]="modalId" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">

      <div class="modal-header">
        <div>
          <h5 class="modal-title fw-bold">Solicitud de adopción</h5>
          <small class="text-muted">Dejá un comentario opcional para el refugio</small>
        </div>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
      </div>

      <div class="modal-body">
        <div class="mb-3">
          <label class="form-label small fw-bold text-secondary">Comentario (opcional)</label>
          <textarea
            class="form-control"
            rows="4"
            [(ngModel)]="comments"
            placeholder="Ej: tengo patio, horarios disponibles, experiencia con mascotas..."
            style="border-radius: 4px;"></textarea>
        </div>

        <div *ngIf="errMsg" class="alert alert-danger mt-3 py-2 small" role="alert">
          {{ errMsg }}
        </div>

        <div *ngIf="okMsg" class="alert alert-success mt-3 py-2 small" role="alert">
          {{ okMsg }}
        </div>
      </div>

      <div class="modal-footer">
        <button
          type="button"
          class="btn btn-secondary"
          data-bs-dismiss="modal"
          [disabled]="loading"
          style="border-radius: 4px;">
          Cancelar
        </button>

        <button
          type="button"
          class="btn btn-primary"
          (click)="submit()"
          [disabled]="loading"
          style="border-radius: 4px;">
          {{ loading ? 'Enviando...' : 'Enviar solicitud' }}
        </button>
      </div>

    </div>
  </div>
</div>
