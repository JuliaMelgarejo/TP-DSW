<div class="pa-page">
  <div class="container px-3" style="max-width: 1100px;">

    <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
      <h2 class="pa-title mb-0">Lista de refugios disponibles</h2>

      <button class="btn btn-outline-secondary btn-sm" type="button">
        Filtros
      </button>
    </div>

    <div *ngIf="loading" class="pa-muted">Cargando refugios...</div>

    <div *ngIf="!loading && shelters.length === 0" class="pa-muted">
      No hay refugios para mostrar.
    </div>

    <div *ngIf="!loading && shelters.length > 0" class="row g-3">
      <div class="col-12 col-md-6 col-lg-4" *ngFor="let shelter of shelters">
        <div
          class="pa-card pa-card-hover h-100"
          style="cursor: pointer;"
          (click)="goToShelterDetail(shelter.id)"
        >
          <div class="pa-section">
            <div class="fw-bold mb-2">{{ shelter.name }}</div>

            <div class="pa-muted" style="font-size: 13px;">
              <strong>Ubicación:</strong>
            </div>
            <div class="pa-muted mb-2" style="font-size: 13px;">
              {{ shelter.address?.city || shelter.address?.province || 'Sin datos' }}
            </div>

            <div class="pa-muted" style="font-size: 13px;">
              <strong>Dirección:</strong>
            </div>
            <div class="pa-muted mb-2" style="font-size: 13px;">
              {{ getAddressText(shelter) }}
            </div>

            <div class="pa-muted" style="font-size: 13px;">
              <strong>Cantidad de animales:</strong>
              {{ getAnimalsCount(shelter) }}
            </div>
          </div>
        </div>
      </div>
    </div>

  </div>
</div>
