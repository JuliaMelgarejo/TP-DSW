<div class="pa-page">
  <div class="container-fluid px-3">

    <h1 class="pa-title mb-4">Productos</h1>

    <!-- Botón crear producto solo para shelter -->
    <a *ngIf="auth.isShelter()" class="mb-3 btn-primary btn" routerLink="/product/create">
      Nuevo producto
    </a>

    <!-- Sin productos -->
    <div *ngIf="!products || products.length === 0" class="pa-muted">
      No hay productos disponibles.
    </div>

    <!-- Lista -->
    <div *ngIf="products && products.length !== 0">
      <div class="row g-3">

        <div class="col-12 col-md-6 col-lg-4" *ngFor="let product of products">

        <div
          class="pa-card pa-card-hover d-block"
          style="overflow:hidden; cursor:pointer;"
          [routerLink]="!auth.isShelter() ? ['/product', product.id] : null"
        >

            <!-- Imagen -->
            <img
              [src]="getProductPhotoUrl(product)"
              [alt]="product?.name || 'Product'"
              class="w-100 d-block"
              style="height:220px; object-fit:cover;"
            />

            <div class="pa-section">

              <!-- Nombre -->
              <div class="fw-bold mb-2">
                {{ product?.name || '—' }}
              </div>

              <!-- Precio -->
              <div class="price-container mb-3">

                <div *ngIf="product.crossed_out_price" class="price-row">
                  <span class="old-price">$ {{ product.crossed_out_price }}</span>

                  <span class="discount-badge">
                    {{
                      Math.round(
                        (1 - product.prices[0].amount / product.crossed_out_price) * 100
                      )
                    }}% OFF
                  </span>
                </div>

                <div class="price-label">
                  <span class="current-price">
                    $ {{ product.prices[0].amount || '—' }}
                  </span>
                </div>

              </div>

              <!-- BOTONES -->
              <div class="mt-3">

                <!-- USER -->
                <div *ngIf="!auth.isShelter()" class="d-flex gap-2">

                <button class="btn btn-primary" (click)="$event.stopPropagation(); addToCart(product)">
                  Agregar al carrito
                </button>

                <button class="btn btn-success" (click)="$event.stopPropagation(); buyNow(product)" routerLink="/cart">
                  Comprar ahora
                </button>

                </div>

                <!-- SHELTER -->
                <div *ngIf="auth.isShelter()">

                  <button
                    class="btn btn-secondary"
                    [routerLink]="['/product/edit', product.id]"
                  >
                    Editar producto
                  </button>

                </div>

              </div>

            </div>
          </div>

        </div>

      </div>
    </div>

  </div>
</div>
