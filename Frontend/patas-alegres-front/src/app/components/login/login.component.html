<div class="bg-light min-vh-100 py-3 py-lg-4">
  <div class="container px-3">
    <div class="row justify-content-center">
      <div class="col-12 col-lg-10 col-xl-7">

        <div class="card border-0 shadow-sm overflow-hidden">
          <div class="row g-0">

            <!-- IMAGEN -->
            <div class="col-12 col-lg-6">
              <div class="d-flex align-items-center justify-content-center p-3 p-lg-4 h-100 bg-body-tertiary">
                <img
                  src="assets/login.jpeg"
                  alt="Login"
                  class="img-fluid"
                />
              </div>
            </div>

            <!-- FORM -->
            <div class="col-12 col-lg-6">
              <div class="p-3 p-md-4">

                <h3 class="fw-bold mb-2">Login</h3>
                <p class="text-muted mb-4">Ingresá con tu usuario y contraseña</p>

                <div class="form-floating mb-3">
                  <input
                    type="text"
                    [(ngModel)]="username"
                    autocomplete="username"
                    class="form-control"
                    placeholder="Usuario"
                  />
                  <label>Usuario</label>
                </div>

                <div class="form-floating mb-3">
                  <input
                    type="password"
                    [(ngModel)]="password"
                    autocomplete="current-password"
                    class="form-control"
                    placeholder="Contraseña"
                  />
                  <label>Contraseña</label>
                </div>

                <div class="d-grid mt-3">
                  <button
                    type="button"
                    class="btn btn-primary"
                    (click)="login()"
                  >
                    Aceptar
                  </button>
                </div>

                <div class="text-center mt-4">
                  <p class="mb-2 text-muted">¿No tenés cuenta?</p>
                </div>

                <div class="d-grid gap-2">
                  <button
                    routerLink="/signIn/user"
                    class="btn btn-outline-primary"
                  >
                    Registrarme
                  </button>

                  <button
                    routerLink="/signIn/shelter/account"
                    class="btn btn-outline-secondary"
                  >
                    Soy un refugio
                  </button>
                </div>

              </div>
            </div>

          </div>
        </div>

      </div>
    </div>
  </div>
</div>
