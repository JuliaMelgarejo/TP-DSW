<div class="wrapper">
  <div class="body">
    <img class="logo" src="../../../assets/login.png" alt="img login">
    <h3>Login</h3>
    <div class="form-floating mb-3 mt-3">
      <input type="text" [(ngModel)]="username" autocomplete="false" class="form-control" placeholder="Ingrese usuario">
      <label>Usuario</label>
    </div>
      <div class="form-floating mb-3 mt-3">
        <input type="password" [(ngModel)]="password" autocomplete="false" class="form-control" placeholder="Ingrese contraseña">
        <label>contraseña</label>
      </div>
      <div class="d-grid gap-2">
            <button type="button" class="btn btn-primary btn-lg" (click)="login()">Aceptar </button>
      </div>
      <p class="mt-3">No tienes cuenta?</p>
      <div class="d-grid gap-2 mt-2">
        <button routerLink="/register/user"
                class="btn btn-outline-primary">
          Registrarme
        </button>

        <button routerLink="/register/shelter/account"
                class="btn btn-outline-success">
          Soy un refugio
        </button>
      </div>
    </div>
</div>
